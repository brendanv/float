[tools]
go = "1.26.1"
buf = "1.66.1"
golangci-lint = "2.11.3"
hledger = { version = "1.52", extract_all = "true" }
air = "latest"

[env]
VAULT_DATA_DIR = "{{config_root}}/data"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.test-v]
description = "Run all tests with verbose output"
run = "go test -v ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.tidy]
description = "Run go mod tidy"
run = "go mod tidy"

[tasks.coverage]
description = "Run tests with coverage and open HTML report"
run = "go test -coverprofile=coverage.out ./... && go tool cover -html=coverage.out"

[tasks.bench]
description = "Run all benchmarks"
run = "go test -bench=. -benchmem ./..."

[tasks.check]
description = "Lint + test"
depends = ["lint", "test"]

[tasks.check-all]
description = "Full pre-commit gate: lint + vet + test"
depends = ["lint", "vet", "test"]

[tasks.floatctl]
description = "Run floatctl"
run = "go run ./cmd/floatctl/"

[tasks.floatd]
description = "Build and run floatd with hot reload (set FLOAT_DATA_DIR or falls back to $VAULT_DATA_DIR)"
run = """
air -c cmd/floatd/.air.toml -- --data-dir "${FLOAT_DATA_DIR:-$VAULT_DATA_DIR}" ${FLOAT_ADDR:+--addr "$FLOAT_ADDR"} --verbose
"""

[tasks.proto-gen]
description = "Regenerate Go code from .proto files"
run = "buf generate"

[tasks.grpc-balances]
description = "Query GetBalances"
usage = '''
flag "--addr <addr>" help="Server address" default="localhost:8080"
flag "--depth <depth>" help="Balance depth (0 = all)" default="0"
flag "--query <query>" help="hledger query filter (e.g. expenses)"
'''
run = '''
if [ -n "$usage_query" ]; then
  DATA="{\"depth\":$usage_depth,\"query\":[\"$usage_query\"]}"
else
  DATA="{\"depth\":$usage_depth}"
fi
buf curl --schema . --protocol grpc --http2-prior-knowledge \
  "http://$usage_addr/float.v1.LedgerService/GetBalances" \
  --data "$DATA"
'''

[tasks.grpc-transactions]
description = "Query ListTransactions"
usage = '''
flag "--addr <addr>" help="Server address" default="localhost:8080"
flag "--query <query>" help="hledger query filter (e.g. \"date:2026-01 expenses\")"
'''
run = '''
if [ -n "$usage_query" ]; then
  DATA="{\"query\":[\"$usage_query\"]}"
else
  DATA="{}"
fi
buf curl --schema . --protocol grpc --http2-prior-knowledge \
  "http://$usage_addr/float.v1.LedgerService/ListTransactions" \
  --data "$DATA"
'''

[tasks.grpc-accounts]
description = "Query ListAccounts"
usage = 'flag "--addr <addr>" help="Server address" default="localhost:8080"'
run = '''
buf curl --schema . --protocol grpc --http2-prior-knowledge \
  "http://$usage_addr/float.v1.LedgerService/ListAccounts" \
  --data "{}"
'''

[tasks.grpc-delete]
description = "Delete a transaction by fid"
usage = '''
flag "--addr <addr>" help="Server address" default="localhost:8080"
arg "<fid>" help="8-char fid of the transaction to delete"
'''
run = '''
buf curl --schema . --protocol grpc --http2-prior-knowledge \
  "http://$usage_addr/float.v1.LedgerService/DeleteTransaction" \
  --data "{\"fid\":\"$usage_fid\"}"
'''

[tasks.float]
description = "Run the float TUI"
run = "go run ./cmd/float/ --server ${FLOAT_ADDR:-localhost:8080}"

[tasks.grpc-modify-tags]
description = "Replace all non-fid tags on a transaction"
usage = '''
flag "--addr <addr>" help="Server address" default="localhost:8080"
flag "--tags <tags>" help="JSON object of tags e.g. {\"category\":\"food\"}" default="{}"
arg "<fid>" help="8-char fid of the transaction to update"
'''
run = '''
buf curl --schema . --protocol grpc --http2-prior-knowledge \
  "http://$usage_addr/float.v1.LedgerService/ModifyTags" \
  --data "{\"fid\":\"$usage_fid\",\"tags\":$usage_tags}"
'''
