[tools]
go = "1.26.1"
buf = "1.66.1"
golangci-lint = "2.11.3"
hledger = { version = "1.51.2", extract_all = "true" }

[env]
VAULT_DATA_DIR = "{{config_root}}/data"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.test-v]
description = "Run all tests with verbose output"
run = "go test -v ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.tidy]
description = "Run go mod tidy"
run = "go mod tidy"

[tasks.coverage]
description = "Run tests with coverage and open HTML report"
run = "go test -coverprofile=coverage.out ./... && go tool cover -html=coverage.out"

[tasks.bench]
description = "Run all benchmarks"
run = "go test -bench=. -benchmem ./..."

[tasks.check]
description = "Lint + test"
depends = ["lint", "test"]

[tasks.check-all]
description = "Full pre-commit gate: lint + vet + test"
depends = ["lint", "vet", "test"]

[tasks.floatctl]
description = "Run floatctl"
run = "go run ./cmd/floatctl/"

[tasks.floatd]
description = "Build and run floatd (set FLOAT_DATA_DIR or falls back to $VAULT_DATA_DIR)"
run = """
go run ./cmd/floatd/ --data-dir "${FLOAT_DATA_DIR:-$VAULT_DATA_DIR}" ${FLOAT_ADDR:+--addr "$FLOAT_ADDR"}
"""

[tasks.proto-gen]
description = "Regenerate Go code from .proto files"
run = "buf generate"

[tasks.grpc-balances]
description = "Query GetBalances (set FLOAT_ADDR to override localhost:8080; FLOAT_DEPTH and FLOAT_QUERY optional)"
run = """
ADDR="${FLOAT_ADDR:-localhost:8080}"
DATA="{\"depth\":${FLOAT_DEPTH:-0}${FLOAT_QUERY:+,\"query\":[\"$FLOAT_QUERY\"]}}"
buf curl --schema . --protocol grpc --http2-prior-knowledge \
  "http://$ADDR/float.v1.LedgerService/GetBalances" \
  --data "$DATA"
"""

[tasks.grpc-transactions]
description = "Query ListTransactions (set FLOAT_ADDR to override localhost:8080; FLOAT_QUERY optional)"
run = """
ADDR="${FLOAT_ADDR:-localhost:8080}"
DATA="${FLOAT_QUERY:+{\"query\":[\"$FLOAT_QUERY\"]}}"
buf curl --schema . --protocol grpc --http2-prior-knowledge \
  "http://$ADDR/float.v1.LedgerService/ListTransactions" \
  --data "${DATA:-{}}"
"""

[tasks.grpc-accounts]
description = "Query ListAccounts (set FLOAT_ADDR to override localhost:8080)"
run = """
ADDR="${FLOAT_ADDR:-localhost:8080}"
buf curl --schema . --protocol grpc --http2-prior-knowledge \
  "http://$ADDR/float.v1.LedgerService/ListAccounts" \
  --data "{}"
"""
