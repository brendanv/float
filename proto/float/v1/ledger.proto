syntax = "proto3";

package float.v1;

option go_package = "github.com/brendanv/float/gen/float/v1;floatv1";

message Amount {
  string commodity = 1; // e.g. "$"
  string quantity = 2; // e.g. "25.00" (formatted decimal)
}

message Posting {
  string account = 1;
  repeated Amount amounts = 2;
  string comment = 3;
}

message Transaction {
  string fid = 1; // 8-char UUID prefix; empty if untagged
  string date = 2; // "YYYY-MM-DD"
  string description = 3;
  string comment = 4;
  repeated Posting postings = 5;
  string status = 6; // "", "Pending" (!), or "Cleared" (*); empty means Unmarked
}

message BalanceRow {
  string display_name = 1; // short segment (e.g. "checking")
  string full_name = 2; // full colon path (e.g. "assets:checking")
  int32 indent = 3;
  repeated Amount amounts = 4;
}

message BalanceReport {
  repeated BalanceRow rows = 1;
  repeated Amount total = 2;
}

message Account {
  string name = 1; // short segment
  string full_name = 2; // full colon path
  string type = 3; // "A", "L", "E", "R", "X", "C", "V"
}

message NetWorthSnapshot {
  string date = 1; // Start date of period, "YYYY-MM-DD"
  repeated Amount assets = 2; // Total assets for this period
  repeated Amount liabilities = 3; // Total liabilities (negative by hledger convention)
  repeated Amount net_worth = 4; // Net worth = assets + liabilities
}

message GetNetWorthTimeseriesRequest {
  string begin = 1; // Optional "YYYY-MM-DD"; no value = all time
  string end = 2; // Optional "YYYY-MM-DD"; no value = today
}

message GetNetWorthTimeseriesResponse {
  repeated NetWorthSnapshot snapshots = 1;
}

message ListTransactionsRequest {
  repeated string query = 1; // hledger query tokens (optional)
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
}

message GetBalancesRequest {
  int32 depth = 1; // 0 = no --depth flag
  repeated string query = 2;
}

message GetBalancesResponse {
  BalanceReport report = 1;
}

message ListAccountsRequest {}

message ListAccountsResponse {
  repeated Account accounts = 1;
}

message ListTagsRequest {}

message ListTagsResponse {
  repeated string tags = 1;
}

message DeleteTransactionRequest {
  string fid = 1;
}

message DeleteTransactionResponse {}

message ModifyTagsRequest {
  string fid = 1;
  map<string, string> tags = 2; // complete desired set of non-fid tags
}

message ModifyTagsResponse {}

message UpdateTransactionDateRequest {
  string fid = 1;
  string new_date = 2; // "YYYY-MM-DD"
}

message UpdateTransactionDateResponse {
  Transaction transaction = 1;
}

message PostingInput {
  string account = 1;
  string amount = 2; // e.g. "$45.00"; empty = auto-balance posting
  string comment = 3;
}

message AddTransactionRequest {
  string description = 1;
  string date = 2; // "YYYY-MM-DD"; empty = today
  string comment = 3;
  repeated PostingInput postings = 4;
}

message AddTransactionResponse {
  Transaction transaction = 1;
}

message UpdateTransactionRequest {
  string fid = 1; // required
  string description = 2; // required; replaces existing
  string date = 3; // "YYYY-MM-DD"; empty = keep existing date
  string comment = 4; // optional; replaces existing non-fid comment
  repeated PostingInput postings = 5; // required; replaces all existing postings
}

message UpdateTransactionResponse {
  Transaction transaction = 1;
}

message UpdateTransactionStatusRequest {
  string fid = 1;
  string status = 2; // "Pending", "Cleared", or "" (Unmarked)
}

message UpdateTransactionStatusResponse {
  Transaction transaction = 1;
}

service LedgerService {
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc GetBalances(GetBalancesRequest) returns (GetBalancesResponse);
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse);
  rpc ListTags(ListTagsRequest) returns (ListTagsResponse);
  rpc DeleteTransaction(DeleteTransactionRequest) returns (DeleteTransactionResponse);
  rpc ModifyTags(ModifyTagsRequest) returns (ModifyTagsResponse);
  rpc UpdateTransactionDate(UpdateTransactionDateRequest) returns (UpdateTransactionDateResponse);
  rpc UpdateTransaction(UpdateTransactionRequest) returns (UpdateTransactionResponse);
  rpc AddTransaction(AddTransactionRequest) returns (AddTransactionResponse);
  rpc UpdateTransactionStatus(UpdateTransactionStatusRequest) returns (UpdateTransactionStatusResponse);
  rpc GetNetWorthTimeseries(GetNetWorthTimeseriesRequest) returns (GetNetWorthTimeseriesResponse);
}
