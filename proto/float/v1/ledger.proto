syntax = "proto3";

package float.v1;

option go_package = "github.com/brendanv/float/gen/float/v1;floatv1";

message Amount {
  string commodity = 1; // e.g. "$"
  string quantity = 2; // e.g. "25.00" (formatted decimal)
}

message Posting {
  string account = 1;
  repeated Amount amounts = 2;
  string comment = 3;
}

message Transaction {
  string fid = 1; // 8-char UUID prefix; empty if untagged
  string date = 2; // "YYYY-MM-DD"
  string description = 3;
  string comment = 4;
  repeated Posting postings = 5;
  string status = 6; // "", "Pending" (!), or "Cleared" (*); empty means Unmarked
  map<string, string> tags = 7; // non-fid tags on the transaction
  optional string payee = 8; // part before "|" in description; nil if no "|"
  optional string note = 9;  // part after "|" in description; nil if no "|"
}

message BalanceRow {
  string display_name = 1; // short segment (e.g. "checking")
  string full_name = 2; // full colon path (e.g. "assets:checking")
  int32 indent = 3;
  repeated Amount amounts = 4;
}

message BalanceReport {
  repeated BalanceRow rows = 1;
  repeated Amount total = 2;
}

message Account {
  string name = 1; // short segment
  string full_name = 2; // full colon path
  string type = 3; // "A", "L", "E", "R", "X", "C", "V"
}

message NetWorthSnapshot {
  string date = 1; // Start date of period, "YYYY-MM-DD"
  repeated Amount assets = 2; // Total assets for this period
  repeated Amount liabilities = 3; // Total liabilities (negative by hledger convention)
  repeated Amount net_worth = 4; // Net worth = assets + liabilities
}

message GetNetWorthTimeseriesRequest {
  string begin = 1; // Optional "YYYY-MM-DD"; no value = all time
  string end = 2; // Optional "YYYY-MM-DD"; no value = today
}

message GetNetWorthTimeseriesResponse {
  repeated NetWorthSnapshot snapshots = 1;
}

message ListTransactionsRequest {
  repeated string query = 1; // hledger query tokens (optional)
  int32 limit = 2;           // max transactions to return; 0 = no limit
  int32 offset = 3;          // number of transactions to skip
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  int32 total = 2;    // total matching transactions (before limit/offset)
  bool has_next = 3;  // true if there are more transactions after this page
}

message GetBalancesRequest {
  int32 depth = 1; // 0 = no --depth flag
  repeated string query = 2;
}

message GetBalancesResponse {
  BalanceReport report = 1;
}

// AccountRegisterRow is one row from `hledger areg <account>`: a single
// transaction touching the focused account, with a signed net change and a
// running balance pre-computed by hledger.
message AccountRegisterRow {
  string fid = 1;                     // 8-char UUID prefix of underlying txn; "" if untagged
  string date = 2;                    // "YYYY-MM-DD"
  string description = 3;
  optional string payee = 4;          // part before "|" in description; nil if no "|"
  optional string note = 5;           // part after "|" in description; nil if no "|"
  string status = 6;                  // "", "Pending", "Cleared"; empty means Unmarked
  repeated string other_accounts = 7; // Accounts in the txn not in or under the focused account
  repeated Amount change = 8;         // Signed net change to the focused account for this txn
  repeated Amount running_total = 9;  // Running balance of the focused account after this row
}

message GetAccountRegisterRequest {
  string account = 1;        // required - focused account (full colon path)
  repeated string query = 2; // optional extra hledger query tokens (date:..., status:..., tag:...)
  int32 limit = 3;           // max rows to return; 0 = no limit
  int32 offset = 4;          // number of rows to skip
}

message GetAccountRegisterResponse {
  repeated AccountRegisterRow rows = 1;
  int32 total = 2;   // total matching rows (before limit/offset)
  bool has_next = 3; // true if there are more rows after this page
}

message ListAccountsRequest {}

message ListAccountsResponse {
  repeated Account accounts = 1;
}

message ListTagsRequest {}

message ListTagsResponse {
  repeated string tags = 1;
}

message ListPayeesRequest {}

message ListPayeesResponse {
  repeated string payees = 1;
}

message DeleteTransactionRequest {
  string fid = 1;
}

message DeleteTransactionResponse {}

message ModifyTagsRequest {
  string fid = 1;
  map<string, string> tags = 2; // complete desired set of non-fid tags
}

message ModifyTagsResponse {}

message UpdateTransactionDateRequest {
  string fid = 1;
  string new_date = 2; // "YYYY-MM-DD"
}

message UpdateTransactionDateResponse {
  Transaction transaction = 1;
}

message PostingInput {
  string account = 1;
  string amount = 2; // e.g. "$45.00"; empty = auto-balance posting
  string comment = 3;
}

message AddTransactionRequest {
  string description = 1;
  string date = 2; // "YYYY-MM-DD"; empty = today
  string comment = 3;
  repeated PostingInput postings = 4;
  string payee = 5; // optional; if set, description becomes "payee | description"
  map<string, string> tags = 6; // optional; user-visible tags (must not have "float-" prefix)
}

message AddTransactionResponse {
  Transaction transaction = 1;
}

message UpdateTransactionRequest {
  string fid = 1; // required
  string description = 2; // required; replaces existing
  string date = 3; // "YYYY-MM-DD"; empty = keep existing date
  string comment = 4; // optional; replaces existing non-fid comment
  repeated PostingInput postings = 5; // required; replaces all existing postings
  string payee = 6; // optional; if set, description becomes "payee | description"
  map<string, string> tags = 7; // optional; if set, replaces all user-visible tags
}

message UpdateTransactionResponse {
  Transaction transaction = 1;
}

message UpdateTransactionStatusRequest {
  string fid = 1;
  string status = 2; // "Pending", "Cleared", or "" (Unmarked)
}

message UpdateTransactionStatusResponse {
  Transaction transaction = 1;
}

message PriceDirective {
  string pid = 1;       // 8-char hex; empty if no pid comment
  string date = 2;      // "YYYY-MM-DD"
  string commodity = 3; // commodity being priced, e.g. "AAPL"
  Amount price = 4;     // price amount, e.g. {commodity: "USD", quantity: "178.50"}
}

message ListPricesRequest {}

message ListPricesResponse {
  repeated PriceDirective prices = 1;
}

message AddPriceRequest {
  string date = 1;      // "YYYY-MM-DD"; empty = today
  string commodity = 2; // commodity being priced, e.g. "AAPL"
  string quantity = 3;  // price amount, e.g. "178.50"
  string currency = 4;  // price commodity, e.g. "USD"
}

message AddPriceResponse {
  PriceDirective price = 1;
}

message DeletePriceRequest {
  string pid = 1;
}

message DeletePriceResponse {}

message AccountDeclaration {
  reserved 1;
  reserved "aid";
  string name = 2; // full account name, e.g. "assets:checking"
  bool has_postings = 3; // true if at least one posting references this account
}

message ListAccountDeclarationsRequest {}

message ListAccountDeclarationsResponse {
  repeated AccountDeclaration declarations = 1;
}

message DeclareAccountRequest {
  string name = 1; // full account name to declare, e.g. "assets:checking"
}

message DeclareAccountResponse {
  AccountDeclaration declaration = 1;
}

message DeleteAccountDeclarationRequest {
  string name = 1; // full account name of the declaration to delete
}

message DeleteAccountDeclarationResponse {}

message MarkReviewedOperation {
  bool reviewed = 1; // true → "Cleared", false → "" (Unmarked)
}

message AddTagOperation {
  string key = 1;
  string value = 2;
}

message RemoveTagOperation {
  string key = 1;
}

message SetPayeeOperation {
  string payee = 1;
}

message ClearPayeeOperation {}

message BulkEditOperation {
  oneof operation {
    MarkReviewedOperation mark_reviewed = 1;
    AddTagOperation add_tag = 2;
    RemoveTagOperation remove_tag = 3;
    SetPayeeOperation set_payee = 4;
    ClearPayeeOperation clear_payee = 5;
  }
}

message BulkEditTransactionsRequest {
  repeated string fids = 1;
  repeated BulkEditOperation operations = 2;
}

message BulkEditTransactionsResponse {
  repeated Transaction transactions = 1;
}

message Snapshot {
  string hash = 1;
  string message = 2;
  string timestamp = 3; // RFC 3339
}

message ListSnapshotsRequest {
  int32 limit = 1; // 0 = default (50)
}

message ListSnapshotsResponse {
  repeated Snapshot snapshots = 1;
}

message RestoreSnapshotRequest {
  string hash = 1;
}

message RestoreSnapshotResponse {}

// ---- Import ----

message BankProfile {
  string name = 1;
  string rules_file = 2; // relative path in data dir
}

message ListBankProfilesRequest {}

message ListBankProfilesResponse {
  repeated BankProfile profiles = 1;
}

message CreateBankProfileRequest {
  string name = 1;         // display name for the profile
  string rules_file = 2;  // relative path in data dir, e.g. "rules/chase.rules"
  bytes rules_content = 3; // content to write to the rules file
}

message CreateBankProfileResponse {
  BankProfile profile = 1;
}

message GetBankProfileContentRequest {
  string name = 1;
}

message GetBankProfileContentResponse {
  string rules_file = 1;   // relative path in data dir
  bytes rules_content = 2; // current content of the rules file
}

message UpdateBankProfileRequest {
  string name = 1;         // current profile name (identifier)
  string new_name = 2;     // new display name (empty = no change)
  bytes rules_content = 3; // new rules file content (empty = no change)
}

message UpdateBankProfileResponse {
  BankProfile profile = 1;
}

message DeleteBankProfileRequest {
  string name = 1;              // profile name to delete
  bool delete_rules_file = 2;   // also delete the rules file from disk
}

message DeleteBankProfileResponse {}

message PreviewImportRequest {
  bytes csv_data = 1;      // raw CSV file contents
  string profile_name = 2; // bank profile name from config
}

message ImportCandidate {
  Transaction transaction = 1; // parsed transaction
  bool is_duplicate = 2;       // true if fingerprint matches existing
  string matched_rule_id = 3;  // float rule that matched (empty if none)
}

message PreviewImportResponse {
  repeated ImportCandidate candidates = 1;
}

message ImportTransactionsRequest {
  repeated int32 candidate_indices = 1; // which candidates to import (from preview)
  bytes csv_data = 2;                   // same CSV data as preview
  string profile_name = 3;             // same profile as preview
}

message ImportTransactionsResponse {
  int32 imported_count = 1;
  repeated Transaction transactions = 2; // the imported transactions
  string import_batch_id = 3;            // unique ID for this import batch (e.g. "2026-04-17-a1b2c3d4")
}

message GetImportedTransactionsRequest {
  string import_batch_id = 1; // required
  int32 limit = 2;            // max transactions to return; 0 = no limit
  int32 offset = 3;           // number of transactions to skip
}

message ImportSummary {
  string import_batch_id = 1; // e.g. "2026-04-17-a1b2c3d4"
  string date = 2;            // "YYYY-MM-DD" extracted from batch ID
  int32 transaction_count = 3;
}

message ListImportsRequest {}

message ListImportsResponse {
  repeated ImportSummary imports = 1;
}

// ---- Categorization Rules ----

message TransactionRule {
  string id = 1;
  string pattern = 2;           // regex pattern
  string payee = 3;             // set payee (empty = no change)
  string account = 4;           // set category account (empty = no change)
  map<string, string> tags = 5; // tags to add
  int32 priority = 6;
  bool auto_reviewed = 7;       // if true, matched transactions are marked Cleared on import
}

message ListRulesRequest {}

message ListRulesResponse {
  repeated TransactionRule rules = 1;
}

message AddRuleRequest {
  string pattern = 1;
  string payee = 2;
  string account = 3;
  map<string, string> tags = 4;
  int32 priority = 5;
  bool auto_reviewed = 6;
}

message AddRuleResponse {
  TransactionRule rule = 1;
}

message UpdateRuleRequest {
  string id = 1;
  string pattern = 2;
  string payee = 3;
  string account = 4;
  map<string, string> tags = 5;
  int32 priority = 6;
  bool auto_reviewed = 7;
}

message UpdateRuleResponse {
  TransactionRule rule = 1;
}

message DeleteRuleRequest {
  string id = 1;
}

message DeleteRuleResponse {}

message PreviewApplyRulesRequest {
  repeated string rule_ids = 1; // empty = all rules
  repeated string query = 2;   // optional hledger query to filter transactions
}

message RuleApplicationPreview {
  string fid = 1;                  // transaction FID
  string description = 2;         // current description
  string matched_rule_id = 3;     // which rule matched
  string current_account = 4;     // current category account
  string new_account = 5;         // proposed new account (empty = no change)
  string current_payee = 6;
  string new_payee = 7;           // proposed new payee (empty = no change)
  map<string, string> add_tags = 8;
}

message PreviewApplyRulesResponse {
  repeated RuleApplicationPreview previews = 1;
}

message ApplyRulesRequest {
  repeated string fids = 1;     // which transactions to apply (from preview)
  repeated string rule_ids = 2; // which rules to apply (empty = all)
  repeated string query = 3;   // same query as preview
}

message ApplyRulesResponse {
  int32 applied_count = 1;
}

service LedgerService {
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc GetAccountRegister(GetAccountRegisterRequest) returns (GetAccountRegisterResponse);
  rpc GetBalances(GetBalancesRequest) returns (GetBalancesResponse);
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse);
  rpc ListTags(ListTagsRequest) returns (ListTagsResponse);
  rpc ListPayees(ListPayeesRequest) returns (ListPayeesResponse);
  rpc DeleteTransaction(DeleteTransactionRequest) returns (DeleteTransactionResponse);
  rpc ModifyTags(ModifyTagsRequest) returns (ModifyTagsResponse);
  rpc UpdateTransactionDate(UpdateTransactionDateRequest) returns (UpdateTransactionDateResponse);
  rpc UpdateTransaction(UpdateTransactionRequest) returns (UpdateTransactionResponse);
  rpc AddTransaction(AddTransactionRequest) returns (AddTransactionResponse);
  rpc UpdateTransactionStatus(UpdateTransactionStatusRequest) returns (UpdateTransactionStatusResponse);
  rpc GetNetWorthTimeseries(GetNetWorthTimeseriesRequest) returns (GetNetWorthTimeseriesResponse);
  rpc ListPrices(ListPricesRequest) returns (ListPricesResponse);
  rpc AddPrice(AddPriceRequest) returns (AddPriceResponse);
  rpc DeletePrice(DeletePriceRequest) returns (DeletePriceResponse);
  rpc ListAccountDeclarations(ListAccountDeclarationsRequest) returns (ListAccountDeclarationsResponse);
  rpc DeclareAccount(DeclareAccountRequest) returns (DeclareAccountResponse);
  rpc DeleteAccountDeclaration(DeleteAccountDeclarationRequest) returns (DeleteAccountDeclarationResponse);
  rpc BulkEditTransactions(BulkEditTransactionsRequest) returns (BulkEditTransactionsResponse);
  rpc ListSnapshots(ListSnapshotsRequest) returns (ListSnapshotsResponse);
  rpc RestoreSnapshot(RestoreSnapshotRequest) returns (RestoreSnapshotResponse);

  // Import
  rpc ListBankProfiles(ListBankProfilesRequest) returns (ListBankProfilesResponse);
  rpc CreateBankProfile(CreateBankProfileRequest) returns (CreateBankProfileResponse);
  rpc GetBankProfileContent(GetBankProfileContentRequest) returns (GetBankProfileContentResponse);
  rpc UpdateBankProfile(UpdateBankProfileRequest) returns (UpdateBankProfileResponse);
  rpc DeleteBankProfile(DeleteBankProfileRequest) returns (DeleteBankProfileResponse);
  rpc PreviewImport(PreviewImportRequest) returns (PreviewImportResponse);
  rpc ImportTransactions(ImportTransactionsRequest) returns (ImportTransactionsResponse);
  rpc GetImportedTransactions(GetImportedTransactionsRequest) returns (ListTransactionsResponse);
  rpc ListImports(ListImportsRequest) returns (ListImportsResponse);

  // Rules
  rpc ListRules(ListRulesRequest) returns (ListRulesResponse);
  rpc AddRule(AddRuleRequest) returns (AddRuleResponse);
  rpc UpdateRule(UpdateRuleRequest) returns (UpdateRuleResponse);
  rpc DeleteRule(DeleteRuleRequest) returns (DeleteRuleResponse);
  rpc PreviewApplyRules(PreviewApplyRulesRequest) returns (PreviewApplyRulesResponse);
  rpc ApplyRules(ApplyRulesRequest) returns (ApplyRulesResponse);
}
